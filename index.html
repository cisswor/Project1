<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #f8fafc;
        }

        .tagline {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 1.5rem 0;
        }

        .about {
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #6366f1;
            color: #fff;
        }

        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        footer {
            margin-top: 2rem;
            color: #475569;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="avatar">👋</div>
        <h1>newguy</h1>
        <p class="tagline">Developer · Builder · Learner</p>
        <hr class="divider" />
        <p class="about">
            Hi! I'm just getting started with web development.
            This is my first website, built with HTML and CSS
            and published using GitHub Pages.
        </p>
        <div class="links">
            <a href="about.html" class="btn btn-primary">About Me</a>
            <a href="https://github.com/cisswor" class="btn btn-primary">GitHub</a>
            <a href="mailto:chhetryic@gmail.com" class="btn btn-secondary">Contact</a>
            <a href="https://github.com/yourusername" class="btn btn-primary">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" class="btn btn-secondary">LinkedIn</a>
            <a href="https://twitter.com/yourusername" class="btn btn-secondary">Twitter</a>
            <a href="https://instagram.com/yourusername" class="btn btn-secondary">Instagram</a>
        </div>
    </div>

    <footer>Built and deployed with GitHub Pages</footer>

</body>

</html>
